# Hybrid CI/CD release pipeline
# GitHub Actions: build/test/lint/package
# Azure DevOps: release orchestration using pre-built artifacts

trigger: none
pr: none

parameters:
  - name: environment
    displayName: Deploy environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod
  - name: branch
    displayName: GitHub branch to deploy from
    type: string
    default: dev

variables:
  # GitHub source settings for artifact retrieval
  - name: GITHUB_OWNER
    value: drewbai
  - name: GITHUB_REPO
    value: fncast
  # The GitHub Actions workflow that publishes the artifact
  - name: GITHUB_WORKFLOW
    value: ci.yml
  # Artifact name produced by GitHub Actions
  - name: GITHUB_ARTIFACT_NAME
    value: functionapp

  # Environment-specific variable groups
  # Each group should define:
  # - AZURE_SERVICE_CONNECTION
  # - FUNCTION_APP_NAME
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: fncast-dev
  - ${{ if eq(parameters.environment, 'staging') }}:
    - group: fncast-staging
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: fncast-prod

stages:
  - stage: Deploy
    displayName: Deploy to ${{ parameters.environment }}
    # Hybrid model: GitHub Actions handles CI, Azure DevOps handles release gates.
    # This aligns with enterprise governance (approvals, checks, audit) while
    # avoiding duplicated CI logic (AZ-400 recommended separation of concerns).
    jobs:
      - deployment: DeployFunction
        displayName: Azure Functions release
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: PowerShell@2
                  displayName: Download GitHub Actions artifact
                  inputs:
                    targetType: inline
                    pwsh: true
                    script: |
                      $ErrorActionPreference = 'Stop'
                      $owner = "$(GITHUB_OWNER)"
                      $repo = "$(GITHUB_REPO)"
                      $workflow = "$(GITHUB_WORKFLOW)"
                      $branch = "${{ parameters.branch }}"
                      $artifactName = "$(GITHUB_ARTIFACT_NAME)"

                      if (-not $env:GITHUB_TOKEN) {
                        throw "GITHUB_TOKEN is required (GitHub PAT with actions:read)."
                      }

                      $headers = @{
                        Authorization = "Bearer $env:GITHUB_TOKEN"
                        Accept = "application/vnd.github+json"
                        "X-GitHub-Api-Version" = "2022-11-28"
                      }

                      $runsUrl = "https://api.github.com/repos/$owner/$repo/actions/workflows/$workflow/runs?branch=$branch&status=success&per_page=1"
                      $runs = Invoke-RestMethod -Uri $runsUrl -Headers $headers
                      $runId = $runs.workflow_runs[0].id
                      if (-not $runId) {
                        throw "No successful runs found for workflow '$workflow' on branch '$branch'."
                      }

                      $artifactsUrl = "https://api.github.com/repos/$owner/$repo/actions/runs/$runId/artifacts"
                      $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
                      $artifact = $artifacts.artifacts | Where-Object { $_.name -eq $artifactName } | Select-Object -First 1
                      if (-not $artifact) {
                        throw "Artifact '$artifactName' not found in run $runId."
                      }

                      $zipPath = "$(Pipeline.Workspace)/artifact.zip"
                      Invoke-WebRequest -Uri $artifact.archive_download_url -Headers $headers -OutFile $zipPath

                      $dest = "$(Pipeline.Workspace)/gh-artifacts"
                      if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
                      New-Item -ItemType Directory -Path $dest | Out-Null
                      Expand-Archive -Path $zipPath -DestinationPath $dest

                      $package = Join-Path $dest "functionapp.zip"
                      if (-not (Test-Path $package)) {
                        throw "functionapp.zip not found in artifact '$artifactName'."
                      }

                      Write-Host "##vso[task.setvariable variable=PACKAGE_PATH]$package"
                  env:
                    # Store a PAT with actions:read scope in a secure variable.
                    GITHUB_TOKEN: $(GITHUB_TOKEN)

                - task: AzureFunctionApp@2
                  displayName: Deploy Function App
                  inputs:
                    azureSubscription: $(AZURE_SERVICE_CONNECTION)
                    appType: functionAppLinux
                    appName: $(FUNCTION_APP_NAME)
                    package: $(PACKAGE_PATH)

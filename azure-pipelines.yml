# Hybrid CI/CD release pipeline
# GitHub Actions: build/test/lint/package
# Azure DevOps: release orchestration using pre-built artifacts

trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

parameters:
  - name: targetEnvironment
    displayName: Deploy up to environment
    type: string
    default: dev
    values:
      - dev
      - staging
      - prod
  - name: branch
    displayName: GitHub branch to deploy from
    type: string
    default: dev
  - name: serviceConnectionDev
    displayName: Azure service connection (dev)
    type: string
    default: fncast-dev-sc
  - name: serviceConnectionStaging
    displayName: Azure service connection (staging)
    type: string
    default: fncast-dev-sc
  - name: serviceConnectionProd
    displayName: Azure service connection (prod)
    type: string
    default: fncast-dev-sc

variables:
  # GitHub source settings for artifact retrieval
  - name: GITHUB_OWNER
    value: drewbai
  - name: GITHUB_REPO
    value: fncast
  # The GitHub Actions workflow that publishes the artifact
  - name: GITHUB_WORKFLOW
    value: azure-functions-deploy.yml
  # Artifact name produced by GitHub Actions
  - name: GITHUB_ARTIFACT_NAME
    value: functionapp
  - name: PIPELINE_ARTIFACT_NAME
    value: functionapp-package

stages:
  - stage: Package
    displayName: Package from GitHub Actions
    jobs:
      - job: Package
        displayName: Download and publish package
        steps:
          - checkout: none

          - task: PowerShell@2
            displayName: Download GitHub Actions artifact
            inputs:
              targetType: inline
              pwsh: true
              script: |
                $ErrorActionPreference = 'Stop'
                $owner = "$(GITHUB_OWNER)"
                $repo = "$(GITHUB_REPO)"
                $workflow = "$(GITHUB_WORKFLOW)"
                $branch = "${{ parameters.branch }}"
                $artifactName = "$(GITHUB_ARTIFACT_NAME)"

                if (-not $env:GITHUB_TOKEN) {
                  throw "GITHUB_TOKEN is required (GitHub PAT with actions:read)."
                }

                $headers = @{
                  Authorization = "Bearer $env:GITHUB_TOKEN"
                  Accept = "application/vnd.github+json"
                  "X-GitHub-Api-Version" = "2022-11-28"
                }

                $runsUrl = "https://api.github.com/repos/$owner/$repo/actions/workflows/$workflow/runs?branch=$branch&status=success&per_page=1"
                $runs = Invoke-RestMethod -Uri $runsUrl -Headers $headers
                $runId = $runs.workflow_runs[0].id
                if (-not $runId) {
                  throw "No successful runs found for workflow '$workflow' on branch '$branch'."
                }

                $artifactsUrl = "https://api.github.com/repos/$owner/$repo/actions/runs/$runId/artifacts"
                $artifacts = Invoke-RestMethod -Uri $artifactsUrl -Headers $headers
                $artifact = $artifacts.artifacts | Where-Object { $_.name -eq $artifactName } | Select-Object -First 1
                if (-not $artifact) {
                  throw "Artifact '$artifactName' not found in run $runId."
                }

                $zipPath = "$(Pipeline.Workspace)/artifact.zip"
                Invoke-WebRequest -Uri $artifact.archive_download_url -Headers $headers -OutFile $zipPath

                $dest = "$(Pipeline.Workspace)/gh-artifacts"
                if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
                New-Item -ItemType Directory -Path $dest | Out-Null
                Expand-Archive -Path $zipPath -DestinationPath $dest

                $package = Join-Path $dest "functionapp.zip"
                if (-not (Test-Path $package)) {
                  throw "functionapp.zip not found in artifact '$artifactName'."
                }

                $packageDir = "$(Pipeline.Workspace)/package"
                if (Test-Path $packageDir) { Remove-Item -Recurse -Force $packageDir }
                New-Item -ItemType Directory -Path $packageDir | Out-Null
                Copy-Item -Path $package -Destination (Join-Path $packageDir "functionapp.zip") -Force
            env:
              # Store a PAT with actions:read scope in a secure variable.
              GITHUB_TOKEN: $(GITHUB_TOKEN)

          - task: PublishPipelineArtifact@1
            displayName: Publish pipeline artifact
            inputs:
              targetPath: $(Pipeline.Workspace)/package
              artifact: $(PIPELINE_ARTIFACT_NAME)

  - stage: DeployDev
    displayName: Deploy to dev
    dependsOn: Package
    condition: and(succeeded(), or(eq('${{ parameters.targetEnvironment }}','dev'), eq('${{ parameters.targetEnvironment }}','staging'), eq('${{ parameters.targetEnvironment }}','prod')))
    variables:
      - group: fncast-dev
    jobs:
      - deployment: DeployDev
        displayName: Azure Functions dev release
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: Download pipeline artifact
                  inputs:
                    artifact: $(PIPELINE_ARTIFACT_NAME)
                    path: $(Pipeline.Workspace)/package

                - task: AzureFunctionApp@2
                  displayName: Deploy Function App
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnectionDev }}
                    appType: functionAppLinux
                    appName: $(FUNCTION_APP_NAME)
                    package: $(Pipeline.Workspace)/package/functionapp.zip

  - stage: DeployStaging
    displayName: Promote to staging
    dependsOn: DeployDev
    condition: and(succeeded(), or(eq('${{ parameters.targetEnvironment }}','staging'), eq('${{ parameters.targetEnvironment }}','prod')))
    variables:
      - group: fncast-staging
    jobs:
      - deployment: DeployStaging
        displayName: Azure Functions staging release
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: Download pipeline artifact
                  inputs:
                    artifact: $(PIPELINE_ARTIFACT_NAME)
                    path: $(Pipeline.Workspace)/package

                - task: AzureFunctionApp@2
                  displayName: Deploy Function App
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnectionStaging }}
                    appType: functionAppLinux
                    appName: $(FUNCTION_APP_NAME)
                    package: $(Pipeline.Workspace)/package/functionapp.zip

  - stage: DeployProd
    displayName: Promote to prod
    dependsOn: DeployStaging
    condition: and(succeeded(), eq('${{ parameters.targetEnvironment }}','prod'))
    variables:
      - group: fncast-prod
    jobs:
      - deployment: DeployProd
        displayName: Azure Functions prod release
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: Download pipeline artifact
                  inputs:
                    artifact: $(PIPELINE_ARTIFACT_NAME)
                    path: $(Pipeline.Workspace)/package

                - task: AzureFunctionApp@2
                  displayName: Deploy Function App
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnectionProd }}
                    appType: functionAppLinux
                    appName: $(FUNCTION_APP_NAME)
                    package: $(Pipeline.Workspace)/package/functionapp.zip

trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.11'

  - script: |
      python --version
      pip install --upgrade pip
      pip install pytest
    displayName: "Install Python + pytest"

  - script: |
      pytest -q || echo "No tests yet"
    displayName: "Run Tests"

variables:
  AZURE_SUBSCRIPTION_ID: $AZURE_SUBSCRIPTION_ID
  AZURE_RESOURCE_GROUP: $AZURE_RESOURCE_GROUP
  AZURE_FUNCTION_APP_NAME: $AZURE_FUNCTION_APP_NAME
  PYTHON_VERSION: "3.11"

stages:
  - build
  - test
  - deploy

# Build stage
build:
  stage: build
  image: python:${PYTHON_VERSION}
  script:
    - echo "Installing dependencies..."
    - pip install --upgrade pip
    - pip install -r requirements.txt --target=".python_packages/lib/site-packages"
    - echo "Creating deployment package..."
    - zip -r functionapp.zip . -x "*.git*" "*.vscode*" "tests/*" "scripts/*" "infrastructure/*" ".gitlab-ci.yml"
  artifacts:
    paths:
      - functionapp.zip
    expire_in: 1 hour
  only:
    - main
    - develop

# Test stage
test:
  stage: test
  image: python:${PYTHON_VERSION}
  script:
    - echo "Installing test dependencies..."
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - echo "Running tests..."
    - pytest tests/ --cov=. --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  only:
    - main
    - develop

# Deploy to Azure Functions
deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  dependencies:
    - build
  script:
    - echo "Logging into Azure..."
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
    - az account set --subscription $AZURE_SUBSCRIPTION_ID
    
    - echo "Deploying to Azure Functions..."
    - az functionapp deployment source config-zip 
        --resource-group $AZURE_RESOURCE_GROUP 
        --name $AZURE_FUNCTION_APP_NAME 
        --src functionapp.zip
    
    - echo "Deployment completed!"
    - az functionapp show 
        --resource-group $AZURE_RESOURCE_GROUP 
        --name $AZURE_FUNCTION_APP_NAME 
        --query "defaultHostName" -o tsv
  environment:
    name: production
    url: https://$AZURE_FUNCTION_APP_NAME.azurewebsites.net
  only:
    - main

# Deploy to staging
deploy_staging:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  dependencies:
    - build
  script:
    - echo "Logging into Azure..."
    - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
    - az account set --subscription $AZURE_SUBSCRIPTION_ID
    
    - echo "Deploying to Azure Functions (Staging)..."
    - az functionapp deployment source config-zip 
        --resource-group $AZURE_RESOURCE_GROUP 
        --name "${AZURE_FUNCTION_APP_NAME}-staging" 
        --src functionapp.zip
  environment:
    name: staging
    url: https://${AZURE_FUNCTION_APP_NAME}-staging.azurewebsites.net
  only:
    - develop

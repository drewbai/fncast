name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v1

      - run: uv python install 3.11

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run mypy .

      - run: uv run pytest
